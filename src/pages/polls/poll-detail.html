<section class="page-section poll-page">
  <div class="poll-hero vintage-panel mb-4 p-4 p-lg-5">
    <p class="page-kicker mb-3"><i class="bi bi-journal-text"></i> Poll details</p>
    <h1 class="page-title fw-bold mb-3">Poll #{{pollId}}</h1>
    <p class="text-muted-zp mb-0">This page is rendered from the dynamic route <span class="fw-semibold">/polls/{id}/</span> and now follows the same warm editorial system.</p>
  </div>
  <div class="row g-3">
    <div class="col-lg-7">
      <div class="vintage-panel p-4 p-lg-5 h-100">
        <h2 class="h4 fw-bold mb-3">What should we ship next?</h2>
        <div class="list-group" data-poll-options>
          <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" type="button" data-option="Faster onboarding">
            Faster onboarding
            <span class="badge text-bg-primary rounded-pill">28%</span>
          </button>
          <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" type="button" data-option="Better analytics">
            Better analytics
            <span class="badge text-bg-primary rounded-pill">41%</span>
          </button>
          <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" type="button" data-option="More themes">
            More themes
            <span class="badge text-bg-primary rounded-pill">31%</span>
          </button>
        </div>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="vintage-panel p-4 p-lg-5 h-100 d-flex flex-column justify-content-between gap-3">
        <div>
          <h2 class="h4 fw-bold mb-3">Vote preview</h2>
          <p class="text-muted-zp mb-0" data-poll-result>Select an option to update this preview.</p>
        </div>
        <a class="btn btn-outline-vintage" href="/dashboard" data-link><i class="bi bi-arrow-left me-2"></i>Back to dashboard</a>
      </div>
    </div>
  </div>
</section>
