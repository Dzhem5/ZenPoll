<section class="page-section login-page">
  <div class="row align-items-center g-4 g-lg-5">
    <div class="col-lg-5">
      <p class="page-kicker mb-3">Authentication</p>
      <h1 class="page-title fw-bold mb-3">Sign in to manage polls.</h1>
      <p class="text-muted-zp mb-0">This is a scaffolded login page with its own HTML, CSS, and JS module.</p>
    </div>
    <div class="col-lg-7">
      <div class="panel-card p-4 p-lg-5">
        <form class="row g-3" data-login-form>
          <div class="col-12">
            <label class="form-label fw-semibold" for="loginEmail">Email</label>
            <input class="form-control form-control-lg" id="loginEmail" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="loginPassword">Password</label>
            <input class="form-control form-control-lg" id="loginPassword" name="password" type="password" placeholder="Password" required />
          </div>
          <div class="col-12 d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input" id="rememberMe" type="checkbox" />
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a class="link-primary text-decoration-none fw-semibold" href="#">Forgot password?</a>
          </div>
          <div class="col-12">
            <button class="btn btn-primary btn-lg w-100" type="submit">Sign in</button>
          </div>
          <div class="col-12">
            <div class="alert alert-info mb-0" role="status" data-login-status>
              Login form ready.
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
